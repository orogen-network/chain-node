name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-node:
    name: build release node binary
    runs-on: ubuntu-latest
    # Heavy Substrate build — keep generous headroom for a cold compile.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # Same toolchain the CI workflow uses for this repo.
      - uses: dtolnay/rust-toolchain@72e0b3f2339874da45e95c19a5ad418a9994f7a5
        with:
          targets: wasm32-unknown-unknown
      - name: Install Substrate build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler clang libclang-dev
      - uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      # Production-shaped build (no dev-runtime / sudo). The in-tree
      # vendor/core2 patch (see README) is applied automatically via Cargo.toml.
      - name: Build release binary
        run: cargo build --release --locked --bin chain-node
      - name: Stage binary
        run: |
          mkdir -p artifacts
          cp target/release/chain-node "artifacts/chain-node-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          (cd artifacts && sha256sum chain-node-* > SHA256SUMS)
          ls -l artifacts
      - uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3
        with:
          name: chain-node-binary
          path: artifacts/
      # Attaches the built binary (+ checksum) to the GitHub release created
      # for this tag. If the release does not yet exist this creates it.
      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes "chain-node release ${TAG}. Binary built by CI." --verify-tag || true
          gh release upload "$TAG" artifacts/* --clobber
